<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>RAAHAT | Welcome</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070');
            --nordic-breeze: #D3DDE7;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            overflow: hidden;
        }

        /* 1. CINEMATIC MOTION (Matches Dashboard) */
        @keyframes gentle-pan {
            0% {
                transform: scale(1.0);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .moving-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: inherit;
            animation: gentle-pan 30s alternate infinite ease-in-out;
            will-change: transform;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        /* 2. DEEP GLASSMORPHISM PANEL */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.5);
        }

        .inner-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
        }

        /* 3. NORDIC INTERACTIVE ELEMENTS */
        .nordic-btn {
            background-color: var(--nordic-breeze);
            color: #0f172a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nordic-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(211, 221, 231, 0.4);
        }

        input::placeholder {
            color: rgba(248, 250, 252, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="moving-bg"></div>
    <div class="bg-overlay"></div>

    <div class="glass-panel w-full max-w-md p-10 relative animate-fade-in">

        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold tracking-[0.2em] text-white mb-3">RAAHAT</h1>
            <p class="text-[10px] text-orange-500 font-bold tracking-[0.3em] uppercase">Your Path to Wellness</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-2 ml-1">Account
                    Email</label>
                <input type="email" id="email"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:ring-1 focus:ring-orange-500/50 transition-all"
                    placeholder="name@example.com">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                <input type="password" id="password"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:ring-1 focus:ring-orange-500/50 transition-all"
                    placeholder="••••••••">
            </div>

            <button type="button" id="loginBtn"
                class="nordic-btn w-full font-bold uppercase tracking-widest rounded-2xl px-4 py-5 mt-4 text-xs">
                Enter Sanctuary
            </button>
            <p id="errorMsg" class="text-xs text-red-500 mt-2 hidden text-center font-semibold"></p>

            <div class="flex items-center my-8">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="px-4 text-[10px] text-slate-500 uppercase tracking-widest">Secure Login</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <button type="button"
                class="w-full inner-glass flex items-center justify-center gap-4 rounded-2xl px-4 py-4 hover:bg-white/10 transition-all text-white border-white/10">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="currentColor"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        opacity="0.6" />
                    <path fill="currentColor"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        opacity="0.6" />
                    <path fill="currentColor"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        opacity="0.6" />
                </svg>
                <span class="text-xs font-bold uppercase tracking-widest">Continue with Google</span>
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-xs text-slate-500 tracking-wide">
                New to the path? <a href="#" class="font-bold text-white hover:text-orange-500 transition-colors">Begin
                    Journey</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                errorMsg.textContent = "Please enter both email and password.";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = "Entering...";
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("user_id", data.user_id);
                    localStorage.setItem("username", data.username);
                    window.location.href = "/dashboard";
                } else {
                    const err = await response.json();
                    errorMsg.textContent = err.detail || "Login failed.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = "Network error. Please try again.";
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = "Enter Sanctuary";
            }
        });
    </script>
</body>

</html>
