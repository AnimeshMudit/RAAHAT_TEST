<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAAHAT | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* The Glassmorphism Panel - adjusted for cool tones */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(148, 163, 184, 0.15); /* Soft slate shadow */
        }
        
        /* A gentle breathing animation using your Nordic Breeze */
        @keyframes gentle-breathe {
            0%, 100% { background-color: #f1f5f9; } /* Very light, icy slate */
            50% { background-color: #D3DDE7; }      /* Your exact Nordic Breeze */
        }
        body {
            animation: gentle-breathe 8s infinite ease-in-out;
            color: #0f172a; /* Slate 900 for crisp readability */
        }

        /* Custom Hover for the Nordic Button */
        .nordic-btn {
            background-color: #D3DDE7;
            color: #0f172a; /* Deep slate text for high contrast */
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }
        .nordic-btn:hover {
            filter: brightness(0.96);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(211, 221, 231, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans antialiased mx-4 selection:bg-slate-200">

    <div class="glass-panel rounded-3xl w-full max-w-md p-8 md:p-10 relative overflow-hidden">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-light tracking-widest text-slate-800 mb-2">RAAHAT</h1>
            <p class="text-sm text-slate-500 font-medium tracking-wide uppercase">Your Path to Wellness</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-500 mb-2 pl-1">Email</label>
                <input type="email" class="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#D3DDE7] transition-all shadow-sm" placeholder="Enter your email">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-500 mb-2 pl-1">Password</label>
                <input type="password" class="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#D3DDE7] transition-all shadow-sm" placeholder="••••••••">
            </div>

            <button class="nordic-btn w-full font-semibold rounded-xl px-4 py-3 mt-2 shadow-sm">
                Sign In
            </button>

            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="px-3 text-xs text-slate-400 uppercase tracking-widest">Or</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button class="w-full bg-white flex items-center justify-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-50 transition-colors border border-slate-200 shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-sm font-medium text-slate-700">Continue with Google</span>
            </button>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-slate-500">Don't have an account? <a href="#" class="font-semibold text-slate-800 hover:underline">Sign up</a></p>
        </div>
    </div>

</body>
</html>
